<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punjab Group of Colleges — SGCMS Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0d1b4b;
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #C8102E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.25rem; font-weight: 800; margin-bottom: .4rem; }
    p { font-size: .85rem; color: rgba(255,255,255,0.7); }
    .status { font-size: .75rem; color: rgba(255,255,255,0.4); margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PUNJAB GROUP OF COLLEGES</h1>
    <p>Connecting to Campus Server Portal...</p>
    <div class="spinner"></div>
    <div class="status" id="status-text">Redirecting to live server...</div>
  </div>

  <script>
    const SYNC_URL = 'https://ntfy.sh/pgc_sahiwal_tunnel_2026/json?poll=1';

    async function redirect() {
      try {
        const res = await fetch(SYNC_URL, { cache: 'no-store' });
        const text = await res.text();
        const lines = text.trim().split('\n').filter(Boolean);
        if (lines.length > 0) {
          const lastEvent = JSON.parse(lines[lines.length - 1]);
          if (lastEvent && lastEvent.message && lastEvent.message.startsWith('http')) {
            window.location.replace(lastEvent.message);
            return;
          }
        }
        fallbackRedirect();
      } catch (err) {
        fallbackRedirect();
      }
    }

    function fallbackRedirect() {
      document.getElementById('status-text').innerText = 'Campus server initializing. Retrying...';
      setTimeout(redirect, 2000);
    }

    redirect();
  </script>
</body>
</html>
