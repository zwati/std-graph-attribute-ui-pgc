<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punjab Group of Colleges — Welcome to SGCMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 20%, #1b2a6b 0%, #0d1b4b 60%, #070e28 100%);
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow effects */
    body::before {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      background: rgba(200, 16, 46, 0.15);
      filter: blur(100px);
      border-radius: 50%;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
    }

    .splash-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(124, 58, 237, 0.1);
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-container {
      width: 90px;
      height: 90px;
      margin: 0 auto 1.5rem;
      background: #ffffff;
      border-radius: 20px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 255, 255, 0.2);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 255, 255, 0.2); }
      50% { transform: scale(1.04); box-shadow: 0 15px 30px rgba(200, 16, 46, 0.3), 0 0 25px rgba(255, 255, 255, 0.4); }
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      background: rgba(200, 16, 46, 0.2);
      border: 1px solid rgba(200, 16, 46, 0.4);
      color: #ff6b81;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 50px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #ffffff;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 1.75rem;
    }

    /* Progress bar loader */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #C8102E, #ff4757, #C8102E);
      border-radius: 10px;
      position: absolute;
      animation: loading 1.6s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(200, 16, 46, 0.8);
    }

    @keyframes loading {
      0% { left: -40%; width: 30%; }
      50% { left: 35%; width: 50%; }
      100% { left: 100%; width: 30%; }
    }

    .status-text {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.3px;
    }

    .credits {
      position: absolute;
      bottom: 1.75rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      z-index: 1;
    }

    .credits strong {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div class="splash-card">
    <div class="logo-container">
      <img src="logo.png" alt="Punjab Group of Colleges" class="logo-img">
    </div>

    <div class="badge">Sahiwal Campus</div>
    <h1>PUNJAB GROUP OF COLLEGES</h1>
    <div class="subtitle">Student Growth &amp; Character Management System</div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <div class="status-text">Loading Portal...</div>
  </div>

  <div class="credits">
    Developed by <strong>ZWATI Solutions</strong>
  </div>

  <script>
    const SYNC_URL = 'https://ntfy.sh/pgc_sahiwal_tunnel_2026/json?poll=1';
    const startTime = Date.now();
    const MIN_DELAY = 2000; // 2.0 seconds minimum display time for readability

    async function redirect() {
      try {
        const res = await fetch(SYNC_URL, { cache: 'no-store' });
        const text = await res.text();
        const lines = text.trim().split('\n').filter(Boolean);
        if (lines.length > 0) {
          const lastEvent = JSON.parse(lines[lines.length - 1]);
          if (lastEvent && lastEvent.message && lastEvent.message.startsWith('http')) {
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, MIN_DELAY - elapsed);
            
            setTimeout(() => {
              window.location.replace(lastEvent.message);
            }, remaining);
            return;
          }
        }
        setTimeout(redirect, 1500);
      } catch (err) {
        setTimeout(redirect, 1500);
      }
    }

    redirect();
  </script>
</body>
</html>
